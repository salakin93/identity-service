server:
  port: 8081

spring:
  application:
    name: identity-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/identity_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info

security:
  jwt:
    issuer: ${JWT_ISSUER:pdf-platform}
    private-key-pem: ${JWT_PRIVATE_KEY_PEM:}
    public-key-pem: ${JWT_PUBLIC_KEY_PEM:}